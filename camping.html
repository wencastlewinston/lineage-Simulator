<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫家堡 WenCastle 露營足跡</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://raw.githubusercontent.com/wencastlewinston/lineage-Simulator/main/1774111559586.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/wencastlewinston/lineage-Simulator/main/1774111559586.png">
    <meta name="theme-color" content="#2d5a27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="search-ui.css">
    <link rel="stylesheet" href="yt-player.css">
    <link rel="stylesheet" href="components.css">
</head>
<body>
    <div class="rainbow-line"></div>
    
    <div class="header-fixed"></div>

    <div class="main-content" id="mainWrapper">
        <div class="brand-banner fade-in"></div>

        <div class="search-container">
            <div class="search-bar-row">
                <input type="text" id="searchInput" onkeyup="if(window.searchTable) searchTable()" placeholder="🔍 搜尋">
                
                <a href="https://www.facebook.com/share/1EQ3BSyzmy/" target="_blank" class="icon-btn">
                    <i class="fab fa-facebook-f fb-ic"></i>
                </a>
                
                <a href="https://www.youtube.com/@WenCastle" target="_blank" class="icon-btn">
                    <i class="fab fa-youtube yt-ic"></i>
                </a>
                
                <button class="icon-btn" onclick="toggleView()" style="color: var(--primary); font-size: 18px;">
                    <i class="fas fa-images"></i>
                </button>

                <button class="icon-btn" onclick="reverseAll()" style="color: var(--primary); font-size: 18px; font-weight: bold;">
                    ⇅
                </button>
            </div>
            
            <div class="tool-bar">
                <div class="tag active year-tag" onclick="filterData('', this, 'year')">全部</div>
                <div class="tag year-tag" onclick="filterData('115', this, 'year')">115年</div>
                <div class="tag year-tag" onclick="filterData('114', this, 'year')">114年</div>
                <div class="tag year-tag" onclick="filterData('113', this, 'year')">113年</div>
                <div class="tag year-tag" onclick="filterData('112', this, 'year')">112年</div>
            </div>

            <div class="tool-bar" id="area-tool-bar" style="border-top: 1px solid #eee; padding-top: 5px;">
                <div class="tag active area-tag" onclick="filterData('', this, 'area')">所有地區</div>
            </div>

            <div class="stat-row">
                <div class="stat-item-small">已完成 <b><span id="stat-total">0</span></b> 露</div>
                <div class="stat-item-small">造訪 <b><span id="stat-camps">0</span></b> 處</div>
                <div class="stat-item-small">2訪 <b><span id="stat-visit2">0</span></b> 次</div>
                <div class="stat-item-small">3訪+ <b><span id="stat-visit3">0</span></b> 次</div>
            </div>
        </div>

        <div id="campBody"></div>
        
        <div class="playlist-card">
            <div class="playlist-header" onclick="togglePlaylist()">
                <span>🍀 有種幸福是我們一起露營 ❤️</span>
                <span id="arrow">▼</span>
            </div>
            <div id="list-camping" class="playlist-content" style="display:block;"></div>
        </div>

        <div class="footer">
            <div class="footer-big">溫士頓+玉鳳+瑄寶+饅頭=溫家堡 🏠</div>
            <div class="footer-mid">記錄每一刻與家人共度的露營美好時光</div>
            <div class="footer-small">溫家堡 WenCastle ⓒ 2021-2026</div>
        </div>
    </div>

    <div id="goTopBtn" onclick="window.scrollTo(0,0)">↑</div>

    <div id="videoOverlay" class="video-overlay" onclick="closeVid()">
        <div class="video-container" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeVid()">✕ 關閉</div>
            <iframe id="popup_player" src="" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <div id="albumOverlay" class="album-overlay" onclick="closeAlbum()">
        <div class="album-container" onclick="event.stopPropagation()">
            <div id="autoPlayBtn" class="album-control-btn" onclick="toggleAutoPlay()">▶️</div>
            <div class="album-close-btn" onclick="closeAlbum()">✕</div>
            <div class="main-photo-wrapper">
                <img id="mainPhoto" src="" alt="溫家堡美照">
            </div>
            <div class="filmstrip-container">
                <div class="filmstrip" id="filmstrip"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="yt-player.js"></script>
    <script src="ui-utils.js"></script>
    <script src="main.js"></script>
</body>
</html>
